<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autobroker2000 Di Filippo Salvo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome per le icone (Aggiornato con CDN ultra stabile) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel per leggere JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FIREBASE LIBRARIES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:3dd2eea57cb406e5bb4280",
            measurementId: "G-N0T2XRWND0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Esponiamo Firebase globalmente in modo sicuro
        window.firebaseDB = db;
        window.firebaseCollection = collection;
        window.firebaseGetDocs = getDocs;
    </script>

    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CONFIG = {
            linkGoogleFormValutazione: "https://docs.google.com/forms/d/e/1FAIpQLSeYtcqgrOejvWqClIlEUneC2LPtTNzf67413H_mxFtcnGdnbw/viewform?embedded=true"
        };

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [currentPage, setCurrentPage] = useState('Home');
          const [selectedCar, setSelectedCar] = useState(null);
          const [activeImageIndex, setActiveImageIndex] = useState(0);
          const [inventoryFilter, setInventoryFilter] = useState('Tutti');
          const [carsData, setCarsData] = useState([]);
          const [isLoading, setIsLoading] = useState(true);

          const menuItems = [
            { label: 'Home', id: 'Home' },
            { label: 'Inventario', id: 'Inventario' },
            { label: 'Vuoi vendere la tua auto', id: 'vendi' },
            { label: 'Contatti', id: 'Contatti' },
            { label: 'Chi Siamo', id: 'chi-siamo' },
          ];

          useEffect(() => {
            const fetchCars = () => {
                // Intervallo per aspettare che Firebase si inizializzi
                let checkDBInterval = setInterval(async () => {
                    if (window.firebaseDB && window.firebaseCollection && window.firebaseGetDocs) {
                        clearInterval(checkDBInterval);
                        try {
                            const carsCol = window.firebaseCollection(window.firebaseDB, 'cars'); 
                            const snapshot = await window.firebaseGetDocs(carsCol);
                            
                            const fetchedCars = [];
                            snapshot.forEach((doc) => {
                                fetchedCars.push({ id: doc.id, ...doc.data() });
                            });
                            
                            setCarsData(fetchedCars);
                            setIsLoading(false); // Sblocca la pagina
                        } catch (error) {
                            console.error("Errore lettura database:", error);
                            setIsLoading(false); // Sblocca la pagina anche se c'è un errore!
                        }
                    }
                }, 200);

                // Timeout di sicurezza: se dopo 4 secondi c'è un problema, sblocca forzatamente il sito
                setTimeout(() => {
                    clearInterval(checkDBInterval);
                    setIsLoading(false);
                }, 4000);
            };

            fetchCars();
          }, []);

          const navigate = (page, car = null) => {
            setCurrentPage(page);
            setSelectedCar(car);
            setActiveImageIndex(0);
            setIsMobileMenuOpen(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const filteredCars = inventoryFilter === 'Tutti' 
            ? carsData 
            : carsData.filter(car => car.category === inventoryFilter);

          const whatsappMessage = selectedCar 
            ? encodeURIComponent(`Salve, vorrei avere maggiori informazioni sulla ${selectedCar.brand} ${selectedCar.model} (${selectedCar.category}) vista sul sito.`) 
            : '';

          return (
            <div className="min-h-screen bg-white font-sans text-slate-800 antialiased flex flex-col">
              
              {/* HEADER DESKTOP */}
              <header className="hidden lg:block relative w-full h-[140px] bg-white z-50 shadow-sm">
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                  <div className="absolute top-0 left-0 w-[42%] h-[90px] bg-[#222d32]" style={{ clipPath: 'polygon(0 0, 100% 0, 85% 100%, 0 100%)' }}></div>
                  <div className="absolute bottom-0 left-0 w-full h-[50px] bg-[#222d32]" style={{ clipPath: 'polygon(7% 0, 100% 0, 100% 100%, 0 100%)' }}></div>
                </div>
                <div className="relative z-10 max-w-[1440px] mx-auto h-full flex flex-col">
                  <div className="flex h-[90px]">
                    <div className="w-[35%] flex items-center pl-10 text-white cursor-pointer" onClick={() => navigate('Home')}>
                      <i className="fa-solid fa-car text-[40px] mr-3 text-[#ebbf40]"></i>
                      <div className="flex flex-col leading-tight">
                        <span className="text-2xl font-black tracking-tighter uppercase">Autobroker2000</span>
                        <span className="text-[10px] tracking-[0.3em] uppercase text-[#ebbf40] font-bold">Di Filippo Salvo</span>
                      </div>
                    </div>
                    <div className="w-[65%] flex items-center justify-end gap-10 pr-10">
                       <div className="flex items-center gap-3">
                         <div className="bg-gray-100 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i className="fa-solid fa-phone text-[#222d32]"></i></div>
                         <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Chiamaci:</span><span className="text-[13px] font-bold text-gray-800">+39 393 975 1296</span></div>
                       </div>
                       <div className="flex items-center gap-3">
                         <div className="bg-gray-100 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i className="fa-solid fa-envelope text-[#222d32]"></i></div>
                         <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Email:</span><span className="text-[13px] font-bold text-gray-800">Filipposalvo@hotmail.it</span></div>
                       </div>
                       <div className="flex items-center gap-3">
                         <div className="bg-gray-100 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i className="fa-solid fa-location-dot text-[#222d32]"></i></div>
                         <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Sede:</span><span className="text-[13px] font-bold text-gray-800">Roma (RM)</span></div>
                       </div>
                       <div className="flex items-center gap-3">
                         <div className="bg-gray-100 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i className="fa-regular fa-clock text-[#222d32]"></i></div>
                         <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Orari:</span><span className="text-[13px] font-bold text-gray-800">9:00 - 19:30</span></div>
                       </div>
                    </div>
                  </div>
                  <div className="flex h-[50px] items-center justify-between text-white px-10">
                     <nav className="flex gap-8 pl-[10%] text-[13px] font-bold uppercase tracking-widest h-full items-center">
                       {menuItems.map((item) => (
                         <a 
                            key={item.label} 
                            href="#" 
                            onClick={(e) => { e.preventDefault(); navigate(item.id); }}
                            className={`transition-all duration-300 border-b-2 py-1 ${currentPage === item.id ? 'text-[#ebbf40] border-[#ebbf40]' : 'border-transparent hover:text-[#ebbf40]'}`}
                         >
                            {item.label}
                         </a>
                       ))}
                     </nav>
                  </div>
                </div>
              </header>

              {/* HEADER MOBILE */}
              <header className="lg:hidden bg-[#222d32] text-white p-5 flex justify-between items-center sticky top-0 z-50">
                <div className="flex items-center cursor-pointer" onClick={() => navigate('Home')}>
                    <i className="fa-solid fa-car text-[30px] mr-2 text-[#ebbf40]"></i>
                    <div className="flex flex-col">
                        <span className="text-xl font-black uppercase tracking-tighter leading-none">Autobroker2000</span>
                        <span className="text-[8px] uppercase tracking-widest text-[#ebbf40]">Di Filippo Salvo</span>
                    </div>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                  {isMobileMenuOpen ? <i className="fa-solid fa-xmark text-[30px]"></i> : <i className="fa-solid fa-bars text-[30px]"></i>}
                </button>
              </header>

              {/* MENU MOBILE OVERLAY */}
              {isMobileMenuOpen && (
                <div className="lg:hidden fixed inset-0 z-40 bg-[#222d32] pt-24 px-8 text-white flex flex-col gap-6 overflow-y-auto">
                    {menuItems.map(item => (
                        <a key={item.label} href="#" onClick={(e) => { e.preventDefault(); navigate(item.id); }} className={`text-2xl font-bold uppercase tracking-widest border-b border-white/10 pb-3 ${currentPage === item.id ? 'text-[#ebbf40]' : ''}`}>{item.label}</a>
                    ))}
                </div>
              )}

              <main className="flex-grow">
                  {/* SCHERMATA DI CARICAMENTO */}
                  {isLoading && currentPage !== 'vendi' && currentPage !== 'chi-siamo' && currentPage !== 'Contatti' && (
                      <div className="flex justify-center items-center py-40">
                          <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-[#ebbf40]"></div>
                      </div>
                  )}

                  {/* VISTA HOME PAGE */}
                  {currentPage === 'Home' && !isLoading && (
                      <>
                          <section className="relative h-[650px] flex items-center justify-center text-center overflow-hidden">
                            <div className="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105" style={{ backgroundImage: 'url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=1920")' }}>
                              <div className="absolute inset-0 bg-black/65"></div>
                            </div>
                            <div className="relative z-10 px-6 max-w-4xl mx-auto">
                              <h2 className="text-4xl md:text-6xl font-black text-white mb-6 uppercase tracking-wider leading-tight">ESPLORA L'AUTO DEI TUOI SOGNI</h2>
                              <div className="flex items-center justify-center gap-5 my-10"><div className="h-px w-24 bg-white/30"></div><i className="fa-solid fa-car text-[30px] text-[#ebbf40]"></i><div className="h-px w-24 bg-white/30"></div></div>
                              <p className="text-white text-lg font-light mb-12 max-w-2xl mx-auto leading-relaxed opacity-90">Auto usate garantite e servizio di noleggio gestiti con l'esperienza pluridecennale di Filippo Salvo.</p>
                              <button onClick={() => navigate('Inventario')} className="bg-[#ebbf40] text-[#222d32] px-12 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-white transition-all shadow-lg">SCOPRI IL PARCO AUTO</button>
                            </div>
                          </section>

                          <section className="py-24 bg-gray-50">
                            <div className="max-w-6xl mx-auto px-6">
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                                <div className="flex flex-col items-center group bg-white p-10 rounded-3xl shadow-sm hover:shadow-xl transition-all border-b-4 border-transparent hover:border-[#ebbf40]">
                                  <div className="w-24 h-24 rounded-full bg-[#ebbf40] flex items-center justify-center mb-8"><i className="fa-solid fa-users text-[38px] text-[#222d32]"></i></div>
                                  <h3 className="text-xl font-black text-[#222d32] mb-5 uppercase tracking-tighter">Esperienza e Passione</h3>
                                  <p className="text-gray-500 text-sm leading-relaxed">Dal 1985 nel settore automobilistico. Un broker esperto al tuo servizio.</p>
                                </div>
                                <div className="flex flex-col items-center group bg-white p-10 rounded-3xl shadow-sm hover:shadow-xl transition-all border-b-4 border-transparent hover:border-[#222d32]">
                                  <div className="w-24 h-24 rounded-full bg-[#222d32] flex items-center justify-center mb-8"><i className="fa-solid fa-car text-[38px] text-white"></i></div>
                                  <h3 className="text-xl font-black text-[#222d32] mb-5 uppercase tracking-tighter">Vendita & Noleggio</h3>
                                  <p className="text-gray-500 text-sm leading-relaxed">Offriamo sia usato garantito di qualità che opzioni di noleggio flessibili.</p>
                                </div>
                                <div className="flex flex-col items-center group bg-white p-10 rounded-3xl shadow-sm hover:shadow-xl transition-all border-b-4 border-transparent hover:border-[#222d32]">
                                  <div className="w-24 h-24 rounded-full bg-[#222d32] flex items-center justify-center mb-8"><i className="fa-solid fa-circle-check text-[38px] text-white"></i></div>
                                  <h3 className="text-xl font-black text-[#222d32] mb-5 uppercase tracking-tighter">Testate da Esperti</h3>
                                  <p className="text-gray-500 text-sm leading-relaxed">Controlli meticolosi derivanti dall'esperienza come ex-collaudatore tecnico.</p>
                                </div>
                              </div>
                            </div>
                          </section>

                          {/* SEZIONE AUTO IN EVIDENZA (Ripristinata) */}
                          <section className="py-24 bg-white border-t border-gray-50">
                            <div className="max-w-[1200px] mx-auto px-6">
                              <div className="text-center mb-16">
                                <h2 className="text-4xl font-black text-[#222d32] uppercase tracking-tighter mb-4">AUTO IN EVIDENZA</h2>
                                <div className="flex items-center justify-center gap-4 mb-6">
                                  <div className="h-[2px] w-12 bg-gray-200"></div>
                                  <i className="fa-solid fa-car text-[20px] text-[#ebbf40]"></i>
                                  <div className="h-[2px] w-12 bg-gray-200"></div>
                                </div>
                                <p className="text-gray-500 text-sm max-w-2xl mx-auto">I migliori modelli selezionati per qualità, prestazioni e affidabilità.</p>
                              </div>

                              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {/* Mostra solo le prime 3 auto */}
                                {carsData.slice(0, 3).map((car) => (
                                  <div key={car.id} onClick={() => navigate('Dettaglio', car)} className="bg-white rounded-2xl overflow-hidden shadow-lg group cursor-pointer transition-all duration-500 hover:-translate-y-2 border border-gray-100 relative">
                                    <div className="absolute top-4 left-4 z-10">
                                        <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md ${car.category === 'Usato' ? 'bg-blue-600 text-white' : 'bg-green-600 text-white'}`}>
                                            {car.category || 'Veicolo'}
                                        </span>
                                    </div>
                                    <div className="relative h-60 overflow-hidden">
                                      <img src={car.images && car.images[0] ? car.images[0] : "https://placehold.co/600x400/eeeeee/999999?text=Nessuna+Foto"} alt={car.model} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                      <div className="absolute top-4 right-4 bg-black/70 backdrop-blur text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">{car.price || 'Trattativa Riservata'}</div>
                                    </div>
                                    <div className="p-8">
                                      <div className="flex items-center gap-2 mb-4">
                                        <div className="w-1.5 h-6 bg-[#ebbf40] rounded-full"></div>
                                        <h3 className="text-xl font-black text-[#222d32] uppercase tracking-tighter">{car.brand} {car.model}</h3>
                                      </div>
                                      <p className="text-gray-400 text-sm leading-relaxed mb-8 h-12 overflow-hidden whitespace-pre-line line-clamp-2">{car.description || 'Nessuna descrizione fornita.'}</p>
                                      
                                      <div className="grid grid-cols-3 bg-gray-50 rounded-xl divide-x divide-gray-200">
                                        <div className="py-4 px-1 text-center">
                                          <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Anno</p>
                                          <p className="text-[11px] font-black text-[#222d32] truncate">{car.year || '-'}</p>
                                        </div>
                                        <div className="py-4 px-1 text-center">
                                          <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Cambio</p>
                                          <p className="text-[11px] font-black text-[#222d32] truncate uppercase">{car.transmission || '-'}</p>
                                        </div>
                                        <div className="py-4 px-1 text-center">
                                          <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Km</p>
                                          <p className="text-[11px] font-black text-[#222d32] truncate">{car.mileage || '-'}</p>
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                ))}
                                {carsData.length === 0 && (
                                    <div className="col-span-full text-center py-10">
                                        <span className="text-gray-400 font-bold uppercase tracking-widest">Nessun veicolo in evidenza al momento.</span>
                                    </div>
                                )}
                              </div>
                              
                              {carsData.length > 0 && (
                                <div className="text-center mt-12">
                                  <button onClick={() => navigate('Inventario')} className="border-2 border-[#222d32] text-[#222d32] px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-[#222d32] hover:text-white transition-all shadow-sm">
                                    Vedi tutte le auto
                                  </button>
                                </div>
                              )}
                            </div>
                          </section>
                      </>
                  )}

                  {/* VISTA INVENTARIO */}
                  {currentPage === 'Inventario' && !isLoading && (
                      <section className="py-24 bg-gray-50">
                          <div className="max-w-[1200px] mx-auto px-6">
                            <div className="text-center mb-10">
                              <h1 className="text-5xl font-black uppercase tracking-tighter text-[#222d32] mb-4">Il Nostro Parco Auto</h1>
                              <div className="flex items-center justify-center gap-4 mb-8"><div className="h-[2px] w-12 bg-[#ebbf40]"></div><i className="fa-solid fa-car text-[20px] text-[#ebbf40]"></i><div className="h-[2px] w-12 bg-[#ebbf40]"></div></div>
                              
                              <div className="flex flex-wrap justify-center gap-4 mb-12">
                                  {['Tutti', 'Usato', 'Noleggio'].map(filter => (
                                      <button 
                                        key={filter}
                                        onClick={() => setInventoryFilter(filter)}
                                        className={`px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition-all shadow-sm ${
                                            inventoryFilter === filter 
                                            ? 'bg-[#222d32] text-[#ebbf40] border-2 border-[#222d32]' 
                                            : 'bg-white text-gray-500 border-2 border-gray-200 hover:border-[#ebbf40] hover:text-[#222d32]'
                                        }`}
                                      >
                                          {filter === 'Tutti' ? 'Tutto il Parco' : (filter === 'Usato' ? 'In Vendita (Usato)' : 'A Noleggio')}
                                      </button>
                                  ))}
                              </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {filteredCars.map((car) => (
                                  <div key={car.id} onClick={() => navigate('Dettaglio', car)} className="bg-white rounded-2xl overflow-hidden shadow-lg group cursor-pointer transition-all duration-500 hover:-translate-y-2 border border-gray-100 relative">
                                    <div className="absolute top-4 left-4 z-10">
                                        <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md ${car.category === 'Usato' ? 'bg-blue-600 text-white' : 'bg-green-600 text-white'}`}>
                                            {car.category}
                                        </span>
                                    </div>
                                    <div className="relative h-60 overflow-hidden">
                                      {/* Utilizza placeholder se l'immagine non è presente */}
                                      <img src={car.images && car.images[0] ? car.images[0] : "https://placehold.co/600x400/eeeeee/999999?text=Nessuna+Foto"} alt={car.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                      <div className="absolute top-4 right-4 bg-[#ebbf40] text-[#222d32] px-3 py-1 rounded-full text-[11px] font-black uppercase tracking-widest">{car.price}</div>
                                    </div>
                                    <div className="p-8">
                                      <h3 className="text-xl font-black text-[#222d32] uppercase tracking-tighter mb-4">{car.brand} {car.model}</h3>
                                      <div className="flex justify-between text-sm text-gray-500 mb-6">
                                          <span className="flex items-center gap-2"><i className="fa-regular fa-calendar"></i> {car.year}</span>
                                          <span className="flex items-center gap-2"><i className="fa-solid fa-gauge-high"></i> {car.mileage}</span>
                                          <span className="flex items-center gap-2"><i className="fa-solid fa-droplet"></i> {car.fuel}</span>
                                      </div>
                                      <button className="w-full bg-[#222d32] text-white py-3 rounded-xl uppercase text-[11px] font-black tracking-widest hover:bg-[#ebbf40] hover:text-[#222d32] transition-colors">Vedi Dettagli</button>
                                    </div>
                                  </div>
                                ))}
                                {filteredCars.length === 0 && (
                                    <div className="col-span-full text-center py-20">
                                        <i className="fa-solid fa-car-side text-6xl text-gray-200 mb-4 block"></i>
                                        <span className="text-gray-400 font-bold uppercase tracking-widest">Nessun veicolo presente nel database.</span>
                                    </div>
                                )}
                            </div>
                          </div>
                      </section>
                  )}

                  {/* VISTA DETTAGLIO */}
                  {currentPage === 'Dettaglio' && selectedCar && !isLoading && (
                      <section className="bg-white py-12">
                          <div className="max-w-[1200px] mx-auto px-6">
                              <button onClick={() => navigate('Inventario')} className="flex items-center gap-2 text-gray-400 hover:text-[#ebbf40] text-xs font-black uppercase tracking-widest mb-8 transition-colors w-max">
                                  <i className="fa-solid fa-chevron-left text-[16px]"></i> Torna all'inventario
                              </button>

                              <div className="bg-white rounded-[3rem] shadow-2xl border border-gray-100 p-6 md:p-12">
                                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16">
                                      
                                      <div className="flex flex-col gap-4">
                                          <div className="w-full aspect-[4/3] rounded-3xl overflow-hidden shadow-lg border border-gray-100 relative">
                                              <div className="absolute top-4 left-4 z-10">
                                                  <span className={`px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest shadow-md ${selectedCar.category === 'Usato' ? 'bg-blue-600 text-white' : 'bg-green-600 text-white'}`}>
                                                      {selectedCar.category}
                                                  </span>
                                              </div>
